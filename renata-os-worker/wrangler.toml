name = "renata-os-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Restrict which site is allowed to call this Worker.
# Update this if your GitHub Pages URL changes.
[vars]
ALLOWED_ORIGIN = "https://rclsampaio-jpg.github.io"
SUPPORT_EMAIL = "manifestandomagicasuporte@gmail.com"

# GEMINI_API_KEY and RESEND_API_KEY are NOT set here — they must be added as
# secrets, so they never end up in this file or in git. Run these once, from
# this folder:
#
#   npx wrangler secret put GEMINI_API_KEY
#   npx wrangler secret put RESEND_API_KEY
#
# Each will prompt you to paste the key directly in your terminal.
